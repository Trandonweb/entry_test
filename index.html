<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODE : STORGE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
}

#scene{

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:20px;
}

.title{

    font-size:48px;
    font-weight:bold;

    margin-bottom:20px;
}

.subtitle{

    opacity:.8;
    margin-bottom:40px;
}

button{

    padding:15px 25px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    margin:5px;

    font-size:16px;
}

.object{

    width:180px;
    height:120px;

    border:3px solid white;

    display:flex;

    justify-content:center;
    align-items:center;

    margin:10px;

    border-radius:12px;

    cursor:pointer;
}

#dialog{

    position:absolute;

    left:50%;
    bottom:20px;

    transform:translateX(-50%);

    width:90%;

    background:rgba(0,0,0,.7);

    padding:15px;

    border-radius:10px;

    text-align:center;
}

.room{

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

</style>
</head>
<body>

<div id="game">

    <div id="scene"></div>

    <div id="dialog">
        CODE : STORGE
    </div>

</div>

<script>

let state={

    drawerOpened:false,
    paperFound:false,
    boxOpened:false,
    capsuleFound:false

};

const scene =
document.getElementById("scene");

const dialog =
document.getElementById("dialog");

function say(text){

    dialog.innerHTML=text;

}

function intro(){

scene.innerHTML=`

<div class="title">
CODE : STORGE
</div>

<div class="subtitle">
TO YOU, BEYOND TIME
</div>

<button onclick="story()">
시작하기
</button>

`;

}

function story(){

scene.innerHTML=`

<h1>성별 선택</h1>

<br>

<button onclick="gameStory()">
남자
</button>

<button onclick="gameStory()">
여자
</button>

`;

say("성별을 선택하세요.");

}

function gameStory(){

scene.innerHTML=`

<h1>스토리</h1>

<p>
당신은 낯선 공간에 떨어졌다.
</p>

<br>

<button onclick="falling()">
다음
</button>

`;

}

function falling(){

scene.innerHTML=`

<h1>떨어진다!!</h1>

<h3>...</h3>

`;

say("어딘가로 떨어지는 중...");

setTimeout(()=>{

escapeRoom();

},2000);

}

function escapeRoom(){

scene.innerHTML=`

<h1>방탈출</h1>

<div class="room">

<div class="object"
onclick="clickDrawer()">
서랍
</div>

<div class="object"
onclick="clickPaper()">
구겨진 종이
</div>

<div class="object"
onclick="clickBox()">
박스
</div>

<div class="object"
onclick="clickDoor()">
문
</div>

</div>

`;

say("방을 조사해 보자.");

}

function clickDrawer(){

let pw =
prompt("서랍 비밀번호");

if(pw==="2880"){

state.drawerOpened=true;

say("서랍이 열렸다.");

}else{

say("틀렸다.");

}

}

function clickPaper(){

if(!state.drawerOpened){

say("먼저 서랍을 열어야 한다.");

return;

}

state.paperFound=true;

say(`
힌트 :

1. 각 색을 글자로 나타낼 때의 글자 수

2. ABCD = A×B×C×D
`);

}

function clickBox(){

if(!state.paperFound){

say("힌트가 필요할 것 같다.");

return;

}

state.boxOpened=true;

state.capsuleFound=true;

say("박스 안에서 캡슐을 발견했다.");

}

function clickDoor(){

if(!state.capsuleFound){

say("아직 탈출할 수 없다.");

return;

}

scene.innerHTML=`

<h1>탈출 성공</h1>

<p>
방을 탈출했다.
</p>

<br>

<button onclick="chapter2()">
다음
</button>

`;

}

function chapter2(){

scene.innerHTML=`

<h1>비밀 메시지</h1>

<p>
CODE : STORGE
</p>

<br>

<button onclick="ending()">
예
</button>

<button onclick="ending()">
아니오
</button>

`;

}

function ending(){

scene.innerHTML=`

<h1>THE END</h1>

<p>
플레이해 주셔서 감사합니다.
</p>

`;

say("엔딩");

}

intro();

</script>

</body>
</html>
